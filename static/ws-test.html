<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test - TaskSite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status.connected {
            background: #10b981;
            color: white;
        }
        .status.disconnected {
            background: #ef4444;
            color: white;
        }
        .status.connecting {
            background: #f59e0b;
            color: white;
        }
        .messages {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .message {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .message .time {
            color: #999;
            font-size: 11px;
            margin-bottom: 5px;
        }
        .message .type {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .message pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-success {
            background: #28a745;
        }
        .btn-danger {
            background: #dc3545;
        }
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            flex: 1;
            min-width: 120px;
        }
        .stat .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat .label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WebSocket Test Panel</h1>
        
        <div class="grid">
            <!-- Подключение -->
            <div class="card">
                <h2>🔌 Подключение</h2>
                <div class="form-group">
                    <label>Session Token:</label>
                    <input type="text" id="token" placeholder="Вставь токен из localStorage или после логина">
                </div>
                <div class="form-group">
                    <label>WebSocket URL:</label>
                    <input type="text" id="wsUrl" value="ws://localhost:8081/api/ws">
                </div>
                <button id="connectBtn" onclick="connect()">Подключиться</button>
                <div style="margin-top: 15px; text-align: center;">
                    <span id="status" class="status disconnected">Отключено</span>
                </div>
            </div>

            <!-- Статистика -->
            <div class="card">
                <h2>📊 Статистика</h2>
                <div class="stats">
                    <div class="stat">
                        <div class="value" id="msgCount">0</div>
                        <div class="label">Сообщений</div>
                    </div>
                    <div class="stat">
                        <div class="value" id="lastMsgTime">-</div>
                        <div class="label">Последнее</div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-secondary" onclick="clearMessages()">Очистить</button>
                    <button class="btn-danger" onclick="disconnect()">Отключиться</button>
                </div>
            </div>
        </div>

        <div class="grid">
            <!-- Тестовые действия -->
            <div class="card">
                <h2>🎯 Тестовые действия</h2>
                <div class="form-group">
                    <label>Создать задачу:</label>
                    <input type="text" id="taskName" placeholder="Название задачи">
                </div>
                <div class="form-group">
                    <textarea id="taskDesc" placeholder="Описание (опционально)"></textarea>
                </div>
                <div class="actions">
                    <button class="btn-success" onclick="createTask()">Создать задачу</button>
                    <button onclick="getTasks()">Получить задачи</button>
                </div>
                <div style="margin-top: 15px; font-size: 12px; color: #666;">
                    💡 После создания задачи посмотри в панель сообщений — должно прийти уведомление!
                </div>
            </div>

            <!-- Логирование -->
            <div class="card">
                <h2>📝 Входящие сообщения</h2>
                <div id="messages" class="messages">
                    <div class="empty-state">Нет сообщений. Подключись к вебсокету...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let messageCount = 0;

        // Автозаполнение токена из localStorage, если есть
        window.onload = function() {
            const savedToken = localStorage.getItem('session_token');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
            }
        };

        function connect() {
            const token = document.getElementById('token').value.trim();
            const wsUrl = document.getElementById('wsUrl').value.trim();

            if (!token) {
                alert('Введите токен!');
                return;
            }

            const statusEl = document.getElementById('status');
            const connectBtn = document.getElementById('connectBtn');
            
            statusEl.className = 'status connecting';
            statusEl.textContent = 'Подключение...';
            connectBtn.disabled = true;

            const wsUrlWithToken = `${wsUrl}?token=${encodeURIComponent(token)}`;
            ws = new WebSocket(wsUrlWithToken);

            ws.onopen = function() {
                statusEl.className = 'status connected';
                statusEl.textContent = 'Подключено';
                connectBtn.disabled = false;
                addSystemMessage('✅ Успешно подключено к WebSocket');
            };

            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    messageCount++;
                    document.getElementById('msgCount').textContent = messageCount;
                    document.getElementById('lastMsgTime').textContent = new Date().toLocaleTimeString();
                    
                    addMessage(msg);
                } catch (e) {
                    addSystemMessage('📨 Получено (не JSON): ' + event.data);
                }
            };

            ws.onclose = function() {
                statusEl.className = 'status disconnected';
                statusEl.textContent = 'Отключено';
                connectBtn.disabled = false;
                addSystemMessage('🔌 Соединение закрыто');
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                statusEl.className = 'status disconnected';
                statusEl.textContent = 'Ошибка';
                connectBtn.disabled = false;
                addSystemMessage('❌ Ошибка соединения');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function addMessage(msg) {
            const container = document.getElementById('messages');
            
            // Убираем empty state
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            const type = msg.type || 'unknown';
            const payload = JSON.stringify(msg.payload || msg, null, 2);
            
            msgDiv.innerHTML = `
                <div class="time">${time}</div>
                <div class="type">${type}</div>
                <pre>${payload}</pre>
            `;
            
            container.insertBefore(msgDiv, container.firstChild);
        }

        function addSystemMessage(text) {
            const container = document.getElementById('messages');
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.style.borderLeftColor = '#6c757d';
            msgDiv.innerHTML = `
                <div class="time">${new Date().toLocaleTimeString()}</div>
                <div style="color: #6c757d;">${text}</div>
            `;
            
            container.insertBefore(msgDiv, container.firstChild);
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '<div class="empty-state">Нет сообщений. Подключись к вебсокету...</div>';
            messageCount = 0;
            document.getElementById('msgCount').textContent = '0';
            document.getElementById('lastMsgTime').textContent = '-';
        }

        async function createTask() {
            const token = document.getElementById('token').value.trim();
            const name = document.getElementById('taskName').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();

            if (!token || !name) {
                alert('Введите токен и название задачи!');
                return;
            }

            try {
                const response = await fetch('http://localhost:8081/api/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Token': token
                    },
                    body: JSON.stringify({
                        name: name,
                        description: desc,
                        author: 'test'
                    })
                });

                if (response.ok) {
                    const task = await response.json();
                    addSystemMessage(`✅ Задача создана: ${task.name} (ID: ${task.id})`);
                    document.getElementById('taskName').value = '';
                    document.getElementById('taskDesc').value = '';
                } else {
                    const error = await response.text();
                    alert('Ошибка: ' + error);
                }
            } catch (err) {
                alert('Ошибка сети: ' + err.message);
            }
        }

        async function getTasks() {
            const token = document.getElementById('token').value.trim();

            if (!token) {
                alert('Введите токен!');
                return;
            }

            try {
                const response = await fetch('http://localhost:8081/api/tasks', {
                    headers: {
                        'X-Session-Token': token
                    }
                });

                if (response.ok) {
                    const tasks = await response.json();
                    addSystemMessage(`📋 Получено задач: ${tasks.length}`);
                } else {
                    alert('Ошибка при получении задач');
                }
            } catch (err) {
                alert('Ошибка сети: ' + err.message);
            }
        }
    </script>
</body>
</html>
