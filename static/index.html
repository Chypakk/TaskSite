<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' rel='stylesheet' integrity='sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB' crossorigin='anonymous'>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js' integrity='sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI' crossorigin='anonymous'></script>

    <link rel='stylesheet' href='css/MainPage.css'>

    <script type='module' src="js/app.js"></script>

    <title>Сайт заявок Союз-PLM</title>

</head>
<body>
    <div id="app">
        <div class='container-fluid auth-container'>
                <button class='show-Register-Form col-3 btn btn-primary btn-custom' id='regLog' data-bs-toggle='modal' data-bs-target='#authModal'>Зарегистрироваться или войти</button>
                <button type='submit' class='show-Register-Form col-2 btn btn-primary btn-custom' id='quit' hidden>Выйти</button>
                <input type='text' class='login-text col-1' id='usernameDisplay' disabled style='color: black;'></input>
        </div>
        
                
    </div>


    <!-- Авторизация и регистрация -->
    <div class='modal fade' tabindex='-1' id='authModal' aria-hidden='true'>
        <div class='modal-dialog modal-dialog-centered modal-dialog-scrollable'>
            <div class='modal-content'>
                <div class='modal-header'>
                    <h1 class='modal-title fs-5' id='exampleModalLabel'>
                        <i class='fas fa-user me-2'></i>
                        Вход / Регистрация
                    </h1>
                    <button type='button' class='btn-close' data-bs-dismiss='modal' aria-label='Закрыть'></button>
                </div>
                <div class='modal-body'>
                    <ul class='nav nav-tabs' id='authTabs' role='tablist'>
                        <li class='nav-item' role='presentation'>
                            <button class='nav-link active' id='login-tab' data-bs-toggle='tab' data-bs-target='#login' type='button' role='tab' aria-selected='true'>
                                <i class='fas fa-sign-in-alt me-2'></i>Вход
                            </button>
                        </li>
                        <li class='nav-item' role='presentation'>
                            <button class='nav-link' id='register-tab' data-bs-toggle='tab' data-bs-target='#register' type='button' role='tab' aria-selected='false' tabindex='-1'>
                                <i class='fas fa-user-plus me-2'></i>Регистрация
                            </button>
                        </li>
                    </ul>

                    <div class='tab-content mt-4' id='authTabContent'>
                        <!-- Форма входа -->
                        <div class='tab-pane fade active show' id='login' role='tabpanel' aria-labelledby='login-tab'>
                            <form id='loginForm'>
                                <div class='form-floating mb-3'>
                                    <input type='text' class='form-control' id='usernameLogin' placeholder='Имя пользователя'>
                                    <label for='floatingInput'>Имя пользователя</label>
                                </div>
                                <div class='form-floating mb-3'>
                                    <input type='password' class='form-control' id='passwordLogin' placeholder='Пароль'>
                                    <label for='floatingInput'>Пароль</label>
                                    <span class='password-toggle' id='togglePassword' data-target='passwordLogin'>
                                        <i class='fas fa-eye'></i>
                                    </span>
                                </div>
                                <div class='alert alert-danger alert-dismissible fade show' id='loginErrorAlert' style='display: none;'>
                                    <strong>Ошибка! </strong><span id='loginErrorAlertText'></span>
                                    <!-- <button type='button' class='btn-close' data-bs-dismiss='alert' aria-label='Close'></button> -->
                                </div>
                                <button type='submit' class='btn-login btn btn-primary w-100 py-3'>
                                    <i class='fas fa-sign-in-alt me-2'></i>Войти
                                </button>
                            </form>
                        </div>

                        <!-- Форма регистрации -->
                        <div class='tab-pane fade' id='register' role='tabpanel' aria-labelledby='register-tab'>
                            <form id='registerForm'>
                                <div class='form-floating mb-3'>
                                    <input type='text' class='form-control' id='usernameRegistry' placeholder='Имя пользователя'>
                                    <label for='floatingInput'>Имя пользователя</label>
                                </div>
                                <div class='form-floating input-with-icon mb-3'>
                                    <input type='password' class='form-control' id='passwordRegistry' placeholder='Пароль'>
                                    <label for='floatingInput'>Пароль</label>
                                    <span class='password-toggle' data-target='passwordRegistry'>
                                        <i class='fas fa-eye'></i>
                                    </span>
                                </div>
                                <div class='form-floating mb-3'>
                                    <input type='password' class='form-control' id='passwordRegistryConfirm' placeholder='Пароль'>
                                    <label for='floatingInput'>Подтвердите пароль</label>
                                    <span class='password-toggle' data-target='passwordRegistryConfirm'>
                                        <i class='fas fa-eye'></i>
                                    </span>
                                </div>
                                <div class='alert alert-danger alert-dismissible fade show' id='registryErrorAlert' style='display: none;'>
                                    <strong>Ошибка! </strong><span id='registryErrorAlertText'></span>
                                    <!-- <button type='button' class='btn-close' data-bs-dismiss='alert' aria-label='Close'></button> -->
                                </div>
                                <div class='alert alert-success alert-dismissible fade show' id='registrySuccessAlert' style='display: none;'>
                                    <strong>Успех! </strong><span id='registrySuccessAlertText'></span>
                                    <!-- <button type='button' class='btn-close' data-bs-dismiss='alert' aria-label='Close'></button> -->
                                </div>
                                <button type='submit' class='btn-regystry btn btn-primary w-100 py-3'>
                                    <i class='fas fa-sign-in-alt me-2'></i>Зарегистрироваться
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
